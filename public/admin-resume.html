<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f4f7fb;
      color: #1f2937;
    }
    .card {
      max-width: 560px;
      margin: 3rem auto;
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input[type="password"], input[type="file"] {
      width: 100%;
      margin-top: 0.4rem;
      padding: 0.8rem;
      border-radius: 10px;
      border: 1px solid #d1d5db;
    }
    button {
      margin-top: 1.2rem;
      padding: 0.8rem 1.2rem;
      border: none;
      border-radius: 999px;
      background: #4f46e5;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    .message {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      display: none;
    }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Update Resume</h1>
    <p>Upload a new PDF resume. This page is protected and is not shown on the public portfolio.</p>
    <form id="resumeForm">
      <label for="password">Admin password</label>
      <input id="password" name="password" type="password" required />

      <label for="resume">Resume PDF</label>
      <input id="resume" name="resume" type="file" accept="application/pdf" required />

      <button type="submit">Upload Resume</button>
    </form>
    <div id="message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById('resumeForm');
    const messageBox = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      messageBox.style.display = 'none';
      messageBox.className = 'message';

      const response = await fetch('/admin/resume', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();
      messageBox.textContent = data.message || 'Something went wrong.';
      messageBox.className = `message ${response.ok ? 'success' : 'error'}`;
      messageBox.style.display = 'block';
    });
  </script>
</body>
</html>
